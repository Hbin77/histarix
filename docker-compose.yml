services:
  nginx:
    container_name: histarix-nginx
    image: nginx:alpine
    ports:
      - "3093:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    container_name: histarix-frontend
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://histarix.semo3.com}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-histarix}:${DB_PASSWORD:-changeme}@histarix-db:5432/histarix
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://histarix.semo3.com}
      - WIKIPEDIA_USER_AGENT=${WIKIPEDIA_USER_AGENT:-Histarix/1.0}
    depends_on:
      histarix-db:
        condition: service_healthy
    container_name: histarix-backend
    restart: unless-stopped

  histarix-db:
    container_name: histarix-db
    image: postgis/postgis:16-3.4-alpine
    environment:
      - POSTGRES_DB=histarix
      - POSTGRES_USER=${DB_USER:-histarix}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-histarix}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
